            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #00f2fe; margin-bottom: 5px; }
        .container { max-width: 900px; margin: auto; background: #162447; padding: 25px; border-radius: 12px; box-shadow: 0px 8px 16px rgba(0,0,0,0.4); }
        .setup-panel { background: #1f4068; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #00f2fe; color: #1a1a2e; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background: #4facfe; transform: scale(1.02); }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin: 5px; width: 220px; text-align: center; background: #334155; color: white; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; background: #e94560; font-weight: bold; margin-top: 10px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; max-height: 350px; overflow-y: auto; padding: 10px; background: #1a1a2e; border-radius: 8px; margin-top: 15px; border: 1px solid #00f2fe; }
        .item-btn { background: #1f4068; color: #fff; border: 1px solid #4facfe; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .item-btn:hover { background: #4facfe; color: #1a1a2e; font-weight: bold; }
        .item-btn.selected { background: #00f2fe; color: #1a1a2e; font-weight: bold; border: 2px solid #fff; }
        .display-area { display: flex; justify-content: space-around; align-items: center; margin: 25px 0; background: #1f4068; padding: 20px; border-radius: 8px; }
        .player-card { width: 45%; padding: 15px; background: #162447; border-radius: 6px; border: 1px solid #4facfe; }
        .choice-name { font-size: 24px; font-weight: bold; color: #00f2fe; margin: 10px 0; }
        .vs { font-size: 28px; font-weight: bold; color: #e94560; }
        #result-banner { font-size: 26px; font-weight: bold; color: #ffdf00; margin: 20px 0; min-height: 35px; text-shadow: 0 0 10px rgba(255,223,0,0.3); }
        .flavor-text { font-size: 16px; font-style: italic; color: #a5f3fc; margin-top: 5px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>

    <h1>RPS 101: Socket Arena</h1>

    <div class="container">

            </div>
            <div id="status" class="status-badge">Connecting to server node...</div>
        </div>

        // 3. SERVER CONNECTION MECHANICS (Render / Socket.io)
        // ============================================================================
        const SERVER_URL = "https://backend-77yp.onrender.com"; 
        let socket = io(SERVER_URL, { autoConnect: true });
        let activeRoomId = null;
        let mySelectedChoice = null;

        const statusBadge = document.getElementById("status");

        socket.on("connect", () => {

            statusBadge.style.background = "#2ea84b";
        });

        socket.on("connect_error", () => {
            statusBadge.innerText = "Offline - Reconnecting...";
            statusBadge.style.background = "#e94560";
        });

        // ============================================================================
        document.getElementById("btn-create").onclick = () => {

        };

        socket.on("room-created", (roomId) => {
            activeRoomId = roomId;
            document.getElementById("lobby-controls").style.display = "none";
            document.getElementById("match-info").style.display = "block";
            document.getElementById("display-match-id").innerText = roomId;
            statusBadge.innerText = "Lobby Ready - Waiting for Friend";
        });

        document.getElementById("btn-join").onclick = () => {
            const id = document.getElementById("input-join-id").value.trim();
            if(id) socket.emit("join-room", id);
        };

        socket.on("duel-initialized", (roomId) => {
            activeRoomId = roomId;
            document.getElementById("lobby-controls").style.display = "none";
            document.getElementById("match-info").style.display = "block";
            document.getElementById("display-match-id").innerText = roomId;
            statusBadge.innerText = "Match Active - Choose a Weapon!";
            statusBadge.style.background = "#00f2fe";
            statusBadge.style.color = "#1a1a2e";
        });

        socket.on("error-msg", (msg) => {
            alert(msg);
        });

        socket.on("peer-disconnected", () => {
            alert("Opponent disconnected. Match closed.");
            location.reload();
        });

        // ============================================================================
        // 5. GAME PLAYGRID DESIGN SETUP
        // ============================================================================
        const grid = document.getElementById("action-grid");
        for (let i = 1; i <= 101; i++) {
            const btn = document.createElement("button");
            btn.className = "item-btn";
            btn.innerText = `${i}. ${rps101Items[i]}`;
            btn.onclick = () => selectWeapon(i);
            grid.appendChild(btn);
        }

        function selectWeapon(index) {
            if (!activeRoomId) {
                alert("Please Host or Join a match lobby first!");
                return;
            }
            
            mySelectedChoice = index;
            document.getElementById("my-choice-display").innerText = rps101Items[index];
            document.getElementById("my-status").innerText = "LOCKED IN";
            document.getElementById("my-status").style.color = "#00f2fe";

            document.querySelectorAll(".item-btn").forEach((b, i) => {
                if((i + 1) === index) b.classList.add("selected");
                else b.classList.remove("selected");
            });

            // Send custom choice IDX integer parameter matching server schema
            socket.emit("submit-move", { roomId: activeRoomId, choiceIdx: index });
        }

        socket.on("opponent-locked", () => {
            document.getElementById("opp-status").innerText = "LOCKED IN";
            document.getElementById("opp-status").style.color = "#e94560";
        });

        // ============================================================================
        socket.on("combat-resolved", (movesObj) => {
            let myId = socket.id;
            let oppId = Object.keys(movesObj).find(id => id !== myId);

            let myMove = movesObj[myId];
            let oppMove = movesObj[oppId];

            document.getElementById("opp-choice-display").innerText = rps101Items[oppMove];
            document.getElementById("opp-status").innerText = "Revealed";

            const resultBanner = document.getElementById("result-banner");
            const flavorBanner = document.getElementById("flavor-banner");

            // Scenario A: Clean Structural Tie
            if (myMove === oppMove) {
                resultBanner.innerText = "IT'S A DRAW!";
                resultBanner.style.color = "#ffdf00";
                flavorBanner.innerText = `${rps101Items[myMove]} clashes evenly with ${rps101Items[oppMove]}`;
            } 
            
            // Scenario B: Cyclic Math Rules Evaluation
            else {
                let distance = (oppMove - myMove + 101) % 101;
                let iWon = (distance <= 50);

                if (iWon) {
                    resultBanner.innerText = "YOU WIN THE ROUND!";
                    resultBanner.style.color = "#00f2fe";
                    
                    let verbAction = RPS_MATRIX[myMove][oppMove];
                    if (!verbAction || verbAction === "") verbAction = "defeats";
                    
                    flavorBanner.innerText = `${rps101Items[myMove]} ${verbAction} ${rps101Items[oppMove]}`;
                } else {
                    resultBanner.innerText = "OPPONENT WINS THE ROUND!";
                    resultBanner.style.color = "#e94560";
                    
                    let verbAction = RPS_MATRIX[oppMove][myMove];
                    if (!verbAction || verbAction === "") verbAction = "defeats";
                    
                    flavorBanner.innerText = `${rps101Items[oppMove]} ${verbAction} ${rps101Items[myMove]}`;

        socket.on("rematch-reset", () => {
            document.getElementById("btn-reset").style.display = "none";
            document.getElementById("result-banner").innerText = "";
            document.getElementById("flavor-banner").innerText = "";
            document.getElementById("my-choice-display").innerText = "Choosing...";
            document.getElementById("opp-choice-display").innerText = "???";
            document.getElementById("my-status").innerText = "Ready to lock in";
            document.getElementById("my-status").style.color = "#aaa";
            document.getElementById("opp-status").innerText = "Waiting...";
            document.getElementById("opp-status").style.color = "#aaa";
            document.querySelectorAll(".item-btn").forEach(b => b.classList.remove("selected"));
            mySelectedChoice = null;
        });

        document.getElementById("btn-reset").onclick = () => {
            socket.emit("request-rematch", activeRoomId);
        };
    </script>
</body>
</html>
